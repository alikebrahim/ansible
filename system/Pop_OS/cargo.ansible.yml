- name: Installing cargo packages
  community.general.cargo:
    executable: "{{ ansible_user_home }}/.cargo/bin/cargo"
    name: "{{ item }}"
    state: present
  loop: "{{ cargo_packages }}"
  become_user: "{{ ansible_user_id }}"
  tags: [packages, cargo, rust]


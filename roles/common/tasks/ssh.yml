---
# SSH setup and configuration

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_home }}/.ssh"
    mode: '0700'
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags: [ssh, security]

- name: Install SSH private key from vault
  ansible.builtin.copy:
    content: "{{ vault_ssh_private_key | default(omit) }}"
    dest: "{{ ansible_user_home }}/.ssh/id_ed25519"
    mode: '0600'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags: [ssh, security]
  when: vault_ssh_private_key is defined

- name: Install SSH private key from file
  ansible.builtin.copy:
    src: "{{ ssh_private_key_source | default(omit) }}"
    dest: "{{ ansible_user_home }}/.ssh/id_ed25519"
    mode: '0600'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags: [ssh, security]
  when: ssh_private_key_source is defined and vault_ssh_private_key is not defined

- name: Install SSH public key from vault
  ansible.builtin.copy:
    content: "{{ vault_ssh_public_key | default(omit) }}"
    dest: "{{ ansible_user_home }}/.ssh/id_ed25519.pub"
    mode: '0644'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags: [ssh, security]
  when: vault_ssh_public_key is defined

- name: Install SSH public key from file
  ansible.builtin.copy:
    src: "{{ ssh_public_key_source | default(omit) }}"
    dest: "{{ ansible_user_home }}/.ssh/id_ed25519.pub"
    mode: '0644'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  tags: [ssh, security]
  when: ssh_public_key_source is defined and vault_ssh_public_key is not defined

- name: Add GitHub to known_hosts file
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -H github.com') }}"
    path: "{{ ansible_user_home }}/.ssh/known_hosts"
    state: present
  tags: [ssh, security]

- name: Add SSH key to agent
  ansible.builtin.shell:
    cmd: eval "$(ssh-agent -s)" && ssh-add {{ ansible_user_home }}/.ssh/id_ed25519
  become: false
  tags: [ssh, security]
  register: ssh_agent
  changed_when: "'Identity added' in ssh_agent.stdout"
  when: vault_ssh_private_key is defined or ssh_private_key_source is defined
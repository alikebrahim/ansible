---
# Development repositories tasks

- name: Set current user facts
  ansible.builtin.set_fact:
    current_user: "{{ lookup('env', 'USER') }}"
    current_user_home: "{{ lookup('env', 'HOME') }}"
  tags: [repositories]

- name: Ensure project directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ current_user }}"
    group: "{{ current_user }}"
  with_items:
    - "{{ current_user_home }}/.local/src"
    - "{{ current_user_home }}/Documents"
  tags: [repositories]

- name: Clone development tool repositories
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    clone: true
    update: true
    force: true
    depth: "{{ item.depth | default(omit) }}"
  become: false
  with_items:
    - { repo: "https://github.com/neovim/neovim", dest: "{{ current_user_home }}/.local/src/neovim" }
    - { repo: "https://github.com/tmux/tmux.git", dest: "{{ current_user_home }}/.local/src/tmux" }
    - { repo: "https://github.com/aristocratos/btop.git", dest: "{{ current_user_home }}/.local/src/btop" }
    - { repo: "https://github.com/junegunn/fzf.git", dest: "{{ current_user_home }}/.local/src/fzf", depth: 1 }
  tags: [repositories, devtools]

- name: Clone personal repositories
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    clone: true
    update: true
    force: true
  become: false
  with_items:
    - { repo: "git@github.com:alikebrahim/obsidian-silo.git", dest: "{{ current_user_home }}/Documents/obsidian" }
    - { repo: "git@github.com:alikebrahim/books.git", dest: "{{ current_user_home }}/Documents/books" }
  tags: [repositories, personal]
---
# This file should be encrypted with ansible-vault
# Use: ansible-vault encrypt vault/secrets.yml
# 
# To edit an encrypted file: ansible-vault edit vault/secrets.yml
# To run a playbook with an encrypted vault: ansible-playbook local.ansible.yml --ask-vault-pass
# 
# You can also store the vault password in a file and reference it:
# - Create a .vault_pass file with your password 
# - Add .vault_pass to .gitignore
# - Use: ansible-playbook local.ansible.yml --vault-password-file .vault_pass

# SSH Keys
# Replace these example values with your actual keys
# vault_ssh_private_key: |
#   -----BEGIN OPENSSH PRIVATE KEY-----
#   ...key content...
#   -----END OPENSSH PRIVATE KEY-----
# 
# vault_ssh_public_key: |
#   ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... user@host

# API Keys
# vault_github_token: "github_pat_..."
# vault_openai_api_key: "sk-..."

# Git User Information
# vault_git_email: "user@example.com"

# Database Credentials
# vault_database_user: "db_user"
# vault_database_password: "secure_password"

# Service Credentials
# vault_tailscale_auth_key: "tskey-..."
# vault_mullvad_account: "1234 5678 9012 3456"
